<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo | Portal Ivan</title>

    <link rel="stylesheet" href="../style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

    <div class="logo">

        <h1>PAINEL</h1>

        <p>Portal Ivan</p>

    </div>

</header>

<main class="stats">

<h2>RODADA</h2>

<div class="card">

<label>Número da Rodada</label>

<input
type="number"
id="rodada"
value="11"
>

<label>Competição</label>

<input
type="text"
id="competicao"
value="Brasileirão Série B"
>

</div>

<h2 style="margin-top:35px;">

JOGO DO BOTAFOGO-SP

</h2>

<div class="card">

<label>Time da Casa</label>

<input
type="text"
id="timeCasa"
value="Botafogo-SP"
>

<label>Gols da Casa</label>

<input
type="number"
id="golsCasa"
>

<label>Time Visitante</label>

<input
type="text"
id="timeVisitante"
>

<label>Gols do Visitante</label>

<input
type="number"
id="golsVisitante"
>

</div>

<h2 style="margin-top:35px;">

DESEMPENHO DO IVAN

</h2>

<div class="card">

<label>Gols</label>

<input
type="number"
id="golsIvan"
value="0"
>

<label>Assistências</label>

<input
type="number"
id="assistenciasIvan"
value="0"
>

<label>Valor de Mercado</label>

<input
type="number"
id="valorMercado"
value="800000"
>

</div><h2 style="margin-top:35px;">

PRÓXIMO JOGO

</h2>

<div class="card">

<label>Adversário</label>

<input
type="text"
id="proximoAdversario"
placeholder="Ex.: Operário"
>

<label>Data</label>

<input
type="date"
id="dataProximoJogo"
>

</div>

<h2 style="margin-top:35px;">

OUTROS JOGOS DA RODADA

</h2>

<div
class="card"
id="listaJogos"
>

<div class="jogo-extra">

<input
type="text"
placeholder="Time da Casa"
class="casaExtra"
>

<input
type="number"
placeholder="0"
class="golsCasaExtra"
>

<span>X</span>

<input
type="number"
placeholder="0"
class="golsVisitanteExtra"
>

<input
type="text"
placeholder="Time Visitante"
class="visitanteExtra"
>

</div>

</div>

<button
class="btn"
id="adicionarJogo"
type="button"
>

+ ADICIONAR OUTRO JOGO

</button>

<br><br><button
class="btn"
id="salvarRodada"
onclick="salvarRodada()"
>

SALVAR RODADA

</button>

</main>

</body>

</html>
